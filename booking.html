<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Room - Royal Palace Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Royal Palace Hotel</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="rooms.html">Rooms</a>
        <a href="gallery.html">Gallery</a>
        <a href="booking.html">Booking</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Book Your Stay</h2>
    <p>Please fill in the details below.</p>

    <form onsubmit="return validateForm()">

        <input type="text" id="name" placeholder="Full Name"><br><br>

        <input type="email" id="email" placeholder="Email"><br><br>

        <input type="tel" id="phone" placeholder="Phone Number"><br><br>

        <label>Check-in Date</label><br>
        <input type="date" id="checkin"><br><br>

        <label>Check-out Date</label><br>
        <input type="date" id="checkout"><br><br>

        <label>Room Type</label><br>
        <select id="room">
            <option>Deluxe Room</option>
            <option>Suite Room</option>
        </select><br><br>

        <button type="submit">Book Now</button>

    </form>
</section>

<footer>
    <p>© 2026 Royal Palace Hotel | All Rights Reserved</p>
</footer>

<script src="script.js"></script>

</body>
</html>
